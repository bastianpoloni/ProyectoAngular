@if (isAutenticated()) {
  <div class="app-shell">
    <header class="hero-bar">
      <div style="display: flex; align-items: center; gap: 0.5rem;">
        <img src="icon.png" alt="App Icon" style="width: 65px; height: 65px; object-fit: contain;">
        <h1 style="margin: 0;">{{ title() }}</h1>
      </div>
      <button type="button" class="logout-btn-desktop" (click)="logout()">Cerrar sesión 🚪</button>
    </header>

    <nav class="desktop-nav" aria-label="Navegación principal">
      @for (item of navigation; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        >
          <span aria-hidden="true">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <main class="workspace">
      <router-outlet />
    </main>

    <nav class="mobile-nav" aria-label="Navegación móvil">
      @for (item of navigation; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        >
          <span aria-hidden="true">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
      <a href="javascript:void(0)" (click)="logout()" style="color: #f87171;">
        <span aria-hidden="true">🚪</span>
        <span>Salir</span>
      </a>
    </nav>
  </div>
} @else {
  <router-outlet />
}
